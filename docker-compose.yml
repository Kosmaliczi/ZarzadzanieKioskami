services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiosk-backend
    working_dir: /app
    command: python app.py
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./database:/database
    environment:
      - KIOSK_DATABASE_PATH=/database/kiosks.db
      - PORT=5000
      - FLASK_RUN_HOST=0.0.0.0
      - FLASK_DEBUG=0
    restart: unless-stopped

  frontend:
    build:
      context: ./my-app
      dockerfile: Dockerfile
    container_name: kiosk-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./my-app:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
